services:
  # The PostgreSQL Database
  - type: psql
    name: split-it-up-db
    plan: free

  # The FastAPI Backend
  - type: web
    name: split-it-up-api
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: split-it-up-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false

  # The React Frontend
  - type: web
    name: split-it-up-web
    env: static
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: split-it-up-api
          envVarKey: RENDER_EXTERNAL_URL
